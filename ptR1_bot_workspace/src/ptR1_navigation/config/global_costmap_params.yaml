# Global Costmap Parameters for ptR1 Robot
global_costmap:
  global_frame: map             # กรอบอ้างอิงหลักของ global costmap มักใช้ "map" เมื่อใช้ AMCL
  robot_base_frame: base_link   # กรอบฐานของหุ่นยนต์
  update_frequency: 0.5         # ความถี่ในการอัปเดตข้อมูล costmap (Hz)
  publish_frequency: 0.2        # ความถี่ในการเผยแพร่ costmap เพื่อ visualization ใน RViz
  transform_tolerance: 0.5      # เวลา buffer ที่จะรอ TF ให้พร้อมก่อนทิ้ง frame (วินาที)
  rolling_window: false         # global costmap ไม่ต้องใช้ rolling window
  resolution: 0.05              # ความละเอียดของ grid (เมตร/เซลล์)
  track_unknown_space: true     # ถ้าหุ่นไม่รู้พื้นที่ (สีเทาใน RViz) ห้ามวางแผนผ่าน

  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  static_layer:
    enabled: true
    map_topic: /map

  obstacle_layer:
    enabled: true
    observation_sources: laser_scan_sensor
    laser_scan_sensor:
      topic: /scan
      data_type: LaserScan
      marking: true
      clearing: true
      max_obstacle_height: 0.5
      min_obstacle_height: 0.0
      obstacle_range: 8.0
      raytrace_range: 8.0

  inflation_layer:
    enabled: true
    inflation_radius: 0.2
    cost_scaling_factor: 5.0