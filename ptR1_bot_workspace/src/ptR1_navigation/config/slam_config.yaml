slam_toolbox:
  ros__parameters:
    # --- Frames & Topics ---
    odom_frame: odom
    base_frame: base_link
    map_frame: map
    scan_topic: /scan
    mode: mapping

    # --- Map Resolution & Update ---
    resolution: 0.02                   
    map_update_interval: 1.0          
    max_laser_range: 12.0

    # --- Motion Update ---
    minimum_travel_distance: 0.03      
    minimum_travel_heading: 0.03        
    minimum_time_interval: 0.05         

    # --- Scan Matching ---
    scan_buffer_size: 60              
    scan_buffer_maximum_scan_distance: 12.0
    use_scan_matching: true
    use_scan_barycenter: true
    link_match_minimum_response_fine: 0.5   
    link_scan_maximum_distance: 1.0         

    # --- Odom Trust ---
    distance_variance_penalty: 0.9
    angle_variance_penalty: 0.05

    # --- Loop Closure ---
    do_loop_closing: true
    loop_search_maximum_distance: 6.0        
    loop_match_minimum_response_coarse: 0.25 
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_fine: 0.6    
    loop_match_maximum_variance_fine: 0.1   

    # --- Solver ---
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: ITERATIVE_SCHUR
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    throttle_scans: 1
    transform_publish_period: 0.02
    transform_timeout: 0.2
    tf_buffer_duration: 30.0